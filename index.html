<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stairset Generator</title>
    <link rel="stylesheet" href="/src/styles.css" />
</head>

<body>
    <div id="app">
        <header class="app-header">
            <h1>Stairset Generator</h1>
            <p>Interactive stair design with procedural geometry and perspective rendering.</p>
        </header>

        <div class="app-layout">
            <section class="panel">
                <h2>Parameters</h2>
                <label>Step count
                    <input type="number" id="stepCount" min="1" max="30" value="8" />
                </label>
                <label>Step width
                    <input type="number" id="stepWidth" min="0.2" step="0.1" value="1.0" />
                </label>
                <label>Step depth
                    <input type="number" id="stepDepth" min="0.1" step="0.1" value="0.3" />
                </label>
                <label>Step height
                    <input type="number" id="stepHeight" min="0.05" step="0.01" value="0.18" />
                </label>
                <label>Landing after step
                    <input type="number" id="landingIndex" min="0" max="30" value="0" />
                </label>
                <label>Landing depth
                    <input type="number" id="landingDepth" min="0.1" step="0.1" value="1.0" />
                </label>
                <label>Handrail
                    <input type="checkbox" id="enableHandrail" checked />
                </label>
                <label>Projection mode
                    <select id="projectionMode">
                        <option value="perspective">Perspective</option>
                        <option value="orthographic">Orthographic</option>
                    </select>
                </label>
                <button id="resetView">Reset View</button>
            </section>

            <section class="viewer">
                <div id="viewer"></div>
            </section>
        </div>
    </div>

    <script type="module" src="/src/main.js"></script>
</body>

</html>
